<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ccircle cx='8' cy='8' r='2' fill='%237fd4e8'/%3E%3C/svg%3E" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        background: #05060a;
        color: #e8e6df;
        font-family: 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
        overflow: hidden;
      }
      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #05060a;
        z-index: 9999;
        transition: opacity 400ms ease;
      }
      #splash.fade {
        opacity: 0;
        pointer-events: none;
      }
      #splash .dot {
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: #7fd4e8;
        animation: splashPulse 1.4s ease-in-out infinite;
      }
      #splash .label {
        margin-top: 24px;
        font-size: 10px;
        letter-spacing: 0.4em;
        color: #2a2f3a;
        text-transform: uppercase;
      }
      @keyframes splashPulse {
        0%, 100% { opacity: 0.2; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.6); }
      }
    </style>
    <title>三体 · 星际逃亡</title>
  </head>
  <body>
    <div id="splash">
      <div class="dot"></div>
      <div class="label">THREE-BODY · STARSEA</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
